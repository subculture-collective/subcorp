networks:
  projects:
    name: projects
    external: true
  dev:
    name: dev
    external: true

volumes:
  workspace:

services:
  subcult-corp-app:
    build: .
    container_name: subcult-corp-app
    networks: [projects, dev]
    env_file: .env
    environment:
      - LOG_FORMAT=pretty
    group_add:
      - "987"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - workspace:/workspace
    labels:
      - com.centurylinklabs.watchtower.enable=false
    restart: unless-stopped

  subcult-corp-worker:
    build: .
    container_name: subcult-corp-worker
    command: ['node', 'scripts/unified-worker/dist/index.js']
    networks: [projects, dev]
    env_file: .env
    environment:
      - LOG_FORMAT=pretty
    group_add:
      - "987"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - workspace:/workspace
    labels:
      - com.centurylinklabs.watchtower.enable=false
    restart: unless-stopped

  subcult-toolbox:
    build:
      context: .
      dockerfile: docker/toolbox/Dockerfile
    container_name: subcult-toolbox
    networks: [projects]
    env_file: .env
    volumes:
      - workspace:/workspace
    labels:
      - com.centurylinklabs.watchtower.enable=false
    restart: unless-stopped

  subcult-sanctum:
    build: .
    container_name: subcult-sanctum
    command: ['node', 'scripts/sanctum-server/dist/server.js']
    networks: [projects, dev]
    env_file: .env
    environment:
      - LOG_FORMAT=pretty
    group_add:
      - "987"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - workspace:/workspace
    labels:
      - com.centurylinklabs.watchtower.enable=false
    restart: unless-stopped
